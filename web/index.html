<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/icons/icon.jpg" />
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, viewport-fit=cover" />
    <title>Clash of Perps</title>

    <!-- PWA + TWA installability. The manifest below is what Bubblewrap
         reads when generating the Android APK for the Solana Seeker dApp
         Store; theme-color paints the Android status-bar / address bar
         to match the splash so the wrapper looks native. apple-touch-icon
         covers iOS Add-to-Home-Screen which doesn't read the manifest. -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0b1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Clash of Perps" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Farcaster Mini App embed — uses the pre-composited /clashofperps.PNG
         for feed cards (bg + logo baked together). The in-app loading
         screen layers /splash-bg.png + /splash-logo.png separately for
         responsive display — those files are referenced in App.jsx /
         GodotCanvas.jsx, not here. -->
    <meta property="og:title" content="Clash of Perps" />
    <meta property="og:description" content="Build, raid, trade. Clash of Clans meets DeFi." />
    <meta property="og:image" content="https://clashofperps.fun/clashofperps.PNG" />
    <meta name="fc:miniapp" content='{"version":"1","imageUrl":"https://clashofperps.fun/clashofperps.PNG","button":{"title":"Play Now","action":{"type":"launch_miniapp","url":"https://clashofperps.fun","name":"Clash of Perps","splashImageUrl":"https://clashofperps.fun/icons/icon.jpg","splashBackgroundColor":"#0a0b1a"}}}' />
    <meta name="fc:frame" content='{"version":"1","imageUrl":"https://clashofperps.fun/clashofperps.PNG","button":{"title":"Play Now","action":{"type":"launch_frame","url":"https://clashofperps.fun","name":"Clash of Perps","splashImageUrl":"https://clashofperps.fun/icons/icon.jpg","splashBackgroundColor":"#0a0b1a"}}}' />

    <!-- Godot JS loaded dynamically by GodotCanvas with cache-bust -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@700;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).catch(function(){});
      }
    </script>
    <script>
      // Debug: log Farcaster SDK state to server (runs before React)
      function _clog(msg) {
        fetch('/api/client-log', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ level: 'debug', message: msg, ua: navigator.userAgent }),
        }).catch(function(){});
      }
      var _inIframe = false;
      try { _inIframe = window !== window.parent; } catch(e) { _inIframe = true; }
      _clog('page-load: iframe=' + _inIframe + ' url=' + location.href);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
